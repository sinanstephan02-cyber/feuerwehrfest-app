<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin-Freigabe</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <h1>Adminbereich freischalten</h1>
    <p class="small">Hier kommt das separate Admin-Passwort rein, das nur du kennst.</p>

    <label for="password">Admin-Passwort</label>
    <input id="password" type="password" placeholder="Admin-Passwort" autocomplete="current-password" />

    <div class="inline-actions">
      <a href="/" class="btn-link">Zurück</a>
      <button id="adminLoginBtn" class="btn-primary">Freischalten</button>
    </div>
    <div id="adminLoginMessage" class="message"></div>
  </div>

  <script src="/static/admin-login.js"></script>
</body>
</html>
